<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Watermarker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1a1a2e;color:#e0e0e0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem;
}
.container{width:100%;max-width:680px}
h1{text-align:center;margin-bottom:1.5rem;font-size:1.6rem;color:#7c6ff7}
label{display:block;margin-bottom:.4rem;font-size:.85rem;color:#aaa}

/* Watermark input */
.input-group{margin-bottom:1.2rem}
.input-group textarea{
  width:100%;padding:.6rem .8rem;border:1px solid #333;border-radius:8px;
  background:#16213e;color:#e0e0e0;font-size:.95rem;outline:none;transition:border .2s;
  resize:vertical;min-height:5rem;line-height:1.5;font-family:inherit;
}
.input-group textarea:focus{border-color:#7c6ff7}

/* Drop zone */
.drop-zone{
  position:relative;border:2px dashed #7c6ff7;border-radius:12px;
  padding:2.5rem 1rem;text-align:center;cursor:pointer;
  transition:background .2s,border-color .2s;margin-bottom:1rem;
}
.drop-zone:hover,.drop-zone.dragover{background:rgba(124,111,247,.08);border-color:#a99bff}
.drop-zone p{pointer-events:none;color:#888;font-size:.95rem}
.drop-zone p span{color:#7c6ff7;font-weight:600}
.drop-zone-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}

/* File list */
.file-list{list-style:none;margin-bottom:1.2rem}
.file-list li{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem .8rem;background:#16213e;border-radius:8px;margin-bottom:.4rem;
  font-size:.88rem;
}
.file-list li .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:.5rem}
.file-list li .size{color:#888;font-size:.78rem;margin-right:.8rem;white-space:nowrap}
.file-list li .remove{
  background:none;border:none;color:#e74c3c;cursor:pointer;font-size:1.1rem;
  padding:0 .3rem;line-height:1;flex-shrink:0;
}
.file-list li .remove:hover{color:#ff6b6b}

/* Submit */
.btn-submit{
  width:100%;padding:.75rem;border:none;border-radius:10px;
  background:#7c6ff7;color:#fff;font-size:1rem;font-weight:600;
  cursor:pointer;transition:opacity .2s;position:relative;overflow:hidden;
}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
.btn-submit:not(:disabled):hover{opacity:.88}
.btn-submit .progress-bar{
  position:absolute;left:0;bottom:0;height:3px;background:rgba(255,255,255,.5);
  transition:width .3s;width:0;
}

/* Results */
.results{list-style:none;margin-bottom:1.2rem}
.results li{
  display:flex;align-items:center;gap:.6rem;
  padding:.6rem .8rem;background:#16213e;border-radius:8px;margin-bottom:.4rem;
  font-size:.88rem;animation:toastIn .3s ease;
}
.results li .status{flex-shrink:0;font-size:.85rem}
.results li .status.done{color:#27ae60}
.results li .status.error{color:#e74c3c}
.results li .status.pending{color:#888}
.results li .rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.results li a{
  color:#7c6ff7;text-decoration:none;font-weight:600;flex-shrink:0;
  padding:.3rem .7rem;border:1px solid #7c6ff7;border-radius:6px;font-size:.8rem;
  transition:background .2s;
}
.results li a:hover{background:rgba(124,111,247,.15)}

/* Toast */
.toast-container{position:fixed;bottom:1.5rem;right:1.5rem;display:flex;flex-direction:column;gap:.5rem;z-index:1000}
.toast{
  padding:.7rem 1.1rem;border-radius:8px;font-size:.85rem;color:#fff;
  animation:toastIn .3s ease;max-width:340px;word-break:break-word;
}
.toast.success{background:#27ae60}
.toast.error{background:#e74c3c}
.toast.fade-out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(10px)}}
</style>
</head>
<body>
<div class="container">
  <h1>Document Watermarker</h1>

  <div class="input-group">
    <label for="watermarkText">Watermark text</label>
    <textarea id="watermarkText" rows="4" autocomplete="off"></textarea>
  </div>

  <div class="drop-zone" id="dropZone">
    <input class="drop-zone-input" type="file" id="fileInput" multiple
           accept=".pdf,.jpg,.jpeg,.png,.webp">
    <p>Drag &amp; drop files here or <span>click to select</span></p>
    <p style="font-size:.78rem;color:#666;margin-top:.4rem">PDF, JPG, PNG, WEBP</p>
  </div>

  <ul class="file-list" id="fileList"></ul>

  <ul class="results" id="resultsList" hidden></ul>

  <button class="btn-submit" id="submitBtn" disabled>
    <span class="btn-text">Apply Watermark</span>
    <div class="progress-bar" id="progressBar"></div>
  </button>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const ALLOWED = new Set(['pdf','jpg','jpeg','png','webp']);
let selectedFiles = [];

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const submitBtn = document.getElementById('submitBtn');
const btnText = submitBtn.querySelector('.btn-text');
const progressBar = document.getElementById('progressBar');
const watermarkInput = document.getElementById('watermarkText');
const toastContainer = document.getElementById('toastContainer');

// --- Default text with today's date ---
const today = new Date().toLocaleDateString('fr-FR');
const defaultText = "Copie destinée à :\nUsage :\nDate : " + today;
watermarkInput.value = defaultText;

function flattenText(t) {
  return t.split('\n').map(l => l.trim()).filter(Boolean).join(' — ');
}

// --- File handling ---
function extOf(name) {
  const i = name.lastIndexOf('.');
  return i >= 0 ? name.slice(i + 1).toLowerCase() : '';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function addFiles(fileListInput) {
  for (const f of fileListInput) {
    if (!ALLOWED.has(extOf(f.name))) {
      showToast(`Skipped ${f.name} — unsupported type`, 'error');
      continue;
    }
    if (!selectedFiles.some(s => s.name === f.name && s.size === f.size)) {
      selectedFiles.push(f);
    }
  }
  renderFileList();
}

function renderFileList() {
  fileList.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="name">${f.name}</span>
      <span class="size">${formatSize(f.size)}</span>
      <button class="remove" data-index="${i}" title="Remove">&times;</button>`;
    li.querySelector('.remove').addEventListener('click', e => {
      e.stopPropagation();
      selectedFiles.splice(i, 1);
      renderFileList();
    });
    fileList.appendChild(li);
  });
  submitBtn.disabled = selectedFiles.length === 0;
}

// Drop zone events
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', () => {
  addFiles(fileInput.files);
  fileInput.value = '';
});

// --- Results ---
const resultsList = document.getElementById('resultsList');

function addResultRow(name) {
  const li = document.createElement('li');
  li.innerHTML = `
    <span class="status pending">⏳</span>
    <span class="rname">${name}</span>
    <span class="action" style="color:#888;font-size:.8rem">Processing…</span>`;
  resultsList.appendChild(li);
  return li;
}

function watermarkedName(name) {
  const dot = name.lastIndexOf('.');
  if (dot < 0) return name + '_watermarked';
  return name.slice(0, dot) + '_watermarked' + name.slice(dot);
}

const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

function setResultDone(li, name, blobUrl) {
  li.querySelector('.status').className = 'status done';
  li.querySelector('.status').textContent = '✓';
  const action = li.querySelector('.action');
  const a = document.createElement('a');
  a.href = blobUrl;
  a.download = watermarkedName(name);
  if (!isIOS) {
    a.target = '_blank';
    a.rel = 'noopener';
  }
  a.textContent = 'Save';
  action.replaceWith(a);
}

function setResultError(li, msg) {
  li.querySelector('.status').className = 'status error';
  li.querySelector('.status').textContent = '✗';
  li.querySelector('.action').textContent = msg;
  li.querySelector('.action').style.color = '#e74c3c';
}

// --- Submit ---
submitBtn.addEventListener('click', async () => {
  if (selectedFiles.length === 0) return;
  const text = watermarkInput.value.trim() || '';
  const total = selectedFiles.length;
  let success = 0;

  submitBtn.disabled = true;
  progressBar.style.width = '0%';
  resultsList.innerHTML = '';
  resultsList.hidden = false;

  for (let i = 0; i < total; i++) {
    const f = selectedFiles[i];
    btnText.textContent = `Processing ${i + 1} / ${total}…`;
    progressBar.style.width = `${((i + 1) / total) * 100}%`;

    const row = addResultRow(f.name);
    const form = new FormData();
    form.append('file', f);
    form.append('watermark_text', text);

    try {
      const res = await fetch('/watermark', { method: 'POST', body: form });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        setResultError(row, err.detail || 'Error');
        continue;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      setResultDone(row, f.name, url);
      success++;
    } catch (e) {
      setResultError(row, 'Network error');
    }
  }

  btnText.textContent = 'Apply Watermark';
  setTimeout(() => { progressBar.style.width = '0%'; }, 600);

  if (success > 0) {
    showToast(`${success} file${success > 1 ? 's' : ''} ready`, 'success');
  }
  selectedFiles = [];
  renderFileList();
});

// --- Toasts ---
function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  toastContainer.appendChild(el);
  setTimeout(() => {
    el.classList.add('fade-out');
    el.addEventListener('animationend', () => el.remove());
  }, 4000);
}
</script>
</body>
</html>
